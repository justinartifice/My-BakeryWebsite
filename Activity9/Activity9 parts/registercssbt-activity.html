 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* Identical Background Design Style */
        body {
            background: linear-gradient(135deg, #cac2c2 0%, #46263c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        /* Simple Semi-Transparent Card Container */
        .register-card {
            background-color: #d6c1ab !important;
            backdrop-filter: blur(10px);
            border: 1px solid #d6c1ab;
            padding: 30px;
            border-radius: 10px;
            color: #a5815c;
            width: 100%;
            max-width: 600px;

        }
        label{
            color:#022353;
        }
    </style>
</head>
<body>


<div class="register-card">
    <h2 class="text-center mb-4">Student Registration</h2>
    
    <form action="#" method="POST" onsubmit="event.preventDefault();">
        
        <!-- Row 1: Full Name and LRN Fields -->
        <div class="row mb-3">
            <div class="col-md-12">
                <label class="form-label">Create Username</label>
                <input type="text" class="form-control" placeholder="Enter username" required>
            </div>
            <div class="col-md-6">
                
            </div>
        </div>


        <!-- Row 2: Combined Username Field Component -->
        <div class="mb-3">
            <label class="form-label">Gmail Account</label>
            <div class="input-group">
                <span class="input-group-text"></span>
                <input type="text" class="form-control" placeholder="gmail.account" required>
                <span class="input-group-text">@gmail.com</span>
            </div>
        </div>


        <!-- Row 3: Track Selection and Gender Controls -->
        


        <!-- NEW Row 4: Password and Confirm Password Fields -->
        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="Create password" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-control" placeholder="Retype password" required>
            </div>
        </div>


        <!-- Row 5: Checkbox terms option wrapper -->
        <div class="mb-4 form-check">
            <input class="form-check-input" type="checkbox" id="terms" checked required>
            <label class="form-check-label small text-black-50" for="terms">
                I agree to the digital Data Privacy Policy rules.
            </label>
        </div>


    <button type="submit" class="btn btn-success w-100 py-2" style="background-color: #8A7083; border-color: #8A7083;">Submit Registration</button>
    <a href="log incssbt-activity.html" style="text-decoration: none; font-weight: bold; color: #0d6efd;">
            <p class="mb-0" style="text-align: center;">Log In</p>
        </a>
        <div class="text-center mt-3">
            <a href="CSSBT-ACTIVITY-9.HTML" class="fw-bold" style="text-decoration:none; color:#0d6efd;">HOME</a>
        </div>
    </form>
</div>
