<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 1. CSS GRADIENT & OPACITY OVERRIDES */
        body {
            /* Linear Gradient blending deep blue to vibrant purple at a 135-degree tilt */
            background: linear-gradient(135deg, #cac2c2  0%, #46263c  100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items:center;
        }

        .login-card {
            /* Using RGBA for opacity: 85% white solid, allowing the background gradient to leak through */
            background-color: #d6c1ab !important;
            backdrop-filter: blur(10px);
            border: 1 px solid rgba(0, 0, 0, 0.89) !important;
            border-radius: 17px !important;
            padding: 30px;
            border-radius:10px;
            color: rgb(0, 0, 0);
            width: 100%;
            max-width: 500px;
        }
    </style>
</head>
<body>
    
    <div class="login-card">
        <h2 class="text-center mb-4" style="color:#a5815c">Login</h2>

        <form action="#" method="POST">
         

        <div class="form-floating mb-3">
            <input type="email" class="form-control form-control-lg text-dark" id="emailInput" placeholder="name@example.com" required>
            <label for="emailInput" class="text-dark">Email Address</label>
        </div>
        
        <!-- Password Input -->
        <div class="form-floating mb-3">
            <input type="password" class="form-control form-control-lg text-dark" id="passwordInput" placeholder="Password">
            <label for="passwordInput" class="text-dark">Password</label>
        </div>


        <button type="submit" style="background-color: #8A7083; border-color: #8A7083; color:rgb(255, 255, 255);" class="btn btn-success w-100 btn-lg mt-2">Sign In</button>
        <a href="registercssbt-activity.html" style="text-decoration: none; font-weight: bold; color: #0d6efd;">
            <p class="mb-0" style="text-align: center;">Create Account</p>
        </a>
        <div class="text-center mt-3">
            <a href="CSSBT-ACTIVITY-9.HTML" class="fw-bold" style="text-decoration:none; color:#0d6efd;">HOME</a>
        </div>


        </form>
    </div>
    
</body>
</html>
